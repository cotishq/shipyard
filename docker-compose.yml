# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
services:
  postgres:
    image: postgres:15
    container_name: shipyard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shipyard
      POSTGRES_PASSWORD: shipyard_db_change_me
      POSTGRES_DB: shipyard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipyard -d shipyard"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    container_name: shipyard-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: shipyard_minio
      MINIO_ROOT_PASSWORD: shipyard_minio_change_me
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: .
    container_name: shipyard-api
    restart: unless-stopped
    command: ./api
    environment:
      DATABASE_URL: postgres://shipyard:shipyard_db_change_me@postgres:5432/shipyard?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: shipyard_minio
      MINIO_SECRET_KEY: shipyard_minio_change_me
      MINIO_BUCKET: deployments
      SHIPYARD_API_KEY: shipyard_api_key_change_me_please
      SHIPYARD_RATE_LIMIT_PER_MINUTE: 60
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: .
    container_name: shipyard-worker
    restart: unless-stopped
    command: ./worker
    environment:
      DATABASE_URL: postgres://shipyard:shipyard_db_change_me@postgres:5432/shipyard?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: shipyard_minio
      MINIO_SECRET_KEY: shipyard_minio_change_me
      MINIO_BUCKET: deployments
      BUILDER_IMAGE: node:20
      MAX_REPO_SIZE_MB: 200
      MAX_BUILD_TIME_MINUTES: 10
      MAX_CONCURRENT_BUILDS: 1
      MAX_LOG_SIZE_BYTES: 8192
      WORKER_METRICS_ADDR: :8083
    ports:
      - "8083:8083"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx
    container_name: shipyard-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf


  prometheus:
    image: prom/prometheus:latest
    container_name: shipyard-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./internal/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:latest
    container_name: shipyard-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

      
